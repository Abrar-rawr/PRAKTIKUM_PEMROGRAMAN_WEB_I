<html>
    <head>
        <title>Form Pendaftaran</title>
    </head>
    <body>
        <form method="post">
            <table width="500" border="1" cellpadding="5" align="center">
                <tr>
                    <td bgcolor="skyblue" align="center">
                        <h2><font face="Arial" color="red">Pendaftaran Kursus</font></h2>
                    </td>
                </tr>
                <tr>
                    <td bgcolor="gray">
                        <h3><font face="Arial">Data Diri</font></h3>
                        <table border="0" cellpadding="2">
                            <tr>
                                <td>Nama</td>
                                <td><input type="text" name="nama"></td>
                            </tr>
                            <tr>
                                <td>Nim</td>
                                <td><input type="text" name="nim"></td>
                            </tr>
                            <tr>
                                <td>E-mail</td>
                                <td><input type="email" name="email"></td>
                            </tr>
                            <tr>
                                <td>Tanggal Lahir</td>
                                <td><input type="date" name="tgl_lahir"></td>
                            </tr>
                            <tr>
                                <td valign="top">Jenis Kelamin</td>
                                <td>
                                    <input type="radio" name="jk" value="Laki-laki">Laki-laki<br>
                                    <input type="radio" name="jk" value="Perempuan">Perempuan
                                </td>
                            </tr>
                            <tr>
                                <td valign="top">Pilih Program Kursus</td>
                                <td>
                                    <input type="checkbox" name="program_kursus" value="C#">C#<br>
                                    <input type="checkbox" name="program_kursus" value="Java">Java<br>
                                    <input type="checkbox" name="program_kursus" value="SQL">SQL<br>
                                    <input type="checkbox" name="program_kursus" value="HTML dan PHP">HTML dan PHP
                                </td>
                            </tr>
                            <tr>
                                <td>Pilihan Hari/Jam Kursus</td>
                                <td >
                                    <select name="hari_jam">
                                        <option value="Senin - Rabu/09.00 - 11.00">Senin - Rabu/09.00 - 11.00</option>
                                        <option value="Kamis - Sabtu/08.00 - 10.00">Kamis - Sabtu/08.00 - 10.00</option>
                                        <option value="Sabtu - Minggu/08.00 - 12.00">Sabtu - Minggu/08.00 - 12.00</option>
                                    </select>
                                </td>
                            </tr>
                        </table>
                        <br><br><br>
                    </td>
                </tr>
                <tr>
                    <td bgcolor="salmon">
                        <p style="margin-bottom: 0;">Komentar Anda</p>
                        <textarea name="deskripsi" rows="5" cols="45"></textarea><br>
                        <input type="reset" name="Reset" value="Reset">
                        <input type="submit" name="Submit" value="Submit">
                        <input type="button" name="Cancel" value="Cancel">
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
